<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useReducer, useRef } = React;

// ── Tokens ──────────────────────────────────────────────────────
const T = {
  navy:"#0F1F3D", navyMid:"#1A3260",
  orange:"#E8500A", sky:"#5B8DB8", smoke:"#EEF2F7",
  white:"#FFFFFF", muted:"#6B7FA3", slate:"#3D5470",
  green:"#1E8A4A", red:"#C0392B", yellow:"#D4860A",
};

// ── Icons ────────────────────────────────────────────────────────
const Icon = ({ name, size=20, color="currentColor" }) => {
  const p = {
    truck:    <><rect x="1" y="3" width="15" height="13" rx="2"/><polygon points="16,8 20,8 23,11 23,16 16,16"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></>,
    driver:   <><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></>,
    alert:    <><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></>,
    doc:      <><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></>,
    plus:     <><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>,
    bell:     <><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></>,
    home:     <><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></>,
    back:     <><polyline points="15 18 9 12 15 6"/></>,
    trash:    <><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></>,
    x:        <><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>,
    check:    <><polyline points="20 6 9 17 4 12"/></>,
    wrench:   <><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></>,
    search:   <><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></>,
  };
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none"
      stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
      {p[name]}
    </svg>
  );
};

// ── Helpers ──────────────────────────────────────────────────────
const daysUntil = d => d ? Math.floor((new Date(d)-new Date())/86400000) : null;
const expColor  = d => d===null?T.muted:d<0?T.red:d<14?T.red:d<30?T.yellow:d<60?T.orange:T.green;
const expText   = d => d===null?"—":d<0?`פג לפני ${Math.abs(d)} ימים`:d===0?"פג היום!":d+" ימים";
const uid = () => Math.random().toString(36).slice(2,8);

// ── Auto-status from docs ─────────────────────────────────────────
const autoStatus = (docs) => {
  if(!docs||docs.length===0) return "תקין";
  const days = docs.map(d=>daysUntil(d.expiry)).filter(d=>d!==null);
  if(days.some(d=>d<0))   return "מושבת";
  if(days.some(d=>d<30))  return "אזהרה";
  return "תקין";
};

// ── Constants ────────────────────────────────────────────────────
const VEH_TYPES = ["משאית","משאית עם נגרר","סמי טריילר","מכלית","נגרר","נגרר וילון","מלגזה","באגר","מחפרון","שופל","מכבש","מנוף","רכב שירות"];
const DOC_TYPES = ["רישיון רכב","טסט","רישיון מוביל","ביטוח חובה","ביטוח צד ג׳","ביטוח מקיף","ביטוח מטען","כיול טכוגרף","בדיקת מנוף","בדיקת מלגזה","בדיקת בלמים","בדיקה תקופתית","מטפים","ערכת עזרה ראשונה","משולשים","אפודים"];
const LIC_TYPES = ["A","A1","A2","B","C","C1","C+E","D","D1","D+E"];
const STATUS_V  = ["תקין","אזהרה","מושבת"];

// ── Storage ──────────────────────────────────────────────────────
const KEY = "fleet360_v2";
const load = () => { try { const s=localStorage.getItem(KEY); return s?JSON.parse(s):{vehicles:[],drivers:[]}; } catch{return{vehicles:[],drivers:[]};} };
const save = s => { try{localStorage.setItem(KEY,JSON.stringify(s));}catch{} };

function reducer(state, action) {
  let n = state;
  switch(action.type) {
    case "ADD_VEH":    n={...state,vehicles:[...state.vehicles,{...action.v,id:uid(),docs:[]}]}; break;
    case "UPD_VEH":    n={...state,vehicles:state.vehicles.map(v=>v.id===action.v.id?action.v:v)}; break;
    case "DEL_VEH":    n={...state,vehicles:state.vehicles.filter(v=>v.id!==action.id)}; break;
    case "ADD_DOC":    n={...state,vehicles:state.vehicles.map(v=>v.id===action.vid?{...v,docs:[...v.docs,{...action.doc,id:uid()}]}:v)}; break;
    case "DEL_DOC":    n={...state,vehicles:state.vehicles.map(v=>v.id===action.vid?{...v,docs:v.docs.filter(d=>d.id!==action.did)}:v)}; break;
    case "ADD_DRV":    n={...state,drivers:[...state.drivers,{...action.d,id:uid()}]}; break;
    case "UPD_DRV":    n={...state,drivers:state.drivers.map(d=>d.id===action.d.id?action.d:d)}; break;
    case "DEL_DRV":    n={...state,drivers:state.drivers.filter(d=>d.id!==action.id)}; break;
    default: return state;
  }
  save(n); return n;
}

// ── Primitives ───────────────────────────────────────────────────
const Inp = ({label,...p}) => (
  <div style={{marginBottom:14}}>
    {label&&<div style={{fontSize:12,fontWeight:700,color:T.navy,marginBottom:5}}>{label}</div>}
    <input {...p} style={{width:"100%",boxSizing:"border-box",padding:"12px 13px",borderRadius:10,border:`1.5px solid ${T.smoke}`,fontSize:16,color:T.navy,background:T.white,outline:"none",fontFamily:"inherit",direction:"rtl",...(p.style||{})}}/>
  </div>
);
const Sel = ({label,options,...p}) => (
  <div style={{marginBottom:14}}>
    {label&&<div style={{fontSize:12,fontWeight:700,color:T.navy,marginBottom:5}}>{label}</div>}
    <select {...p} style={{width:"100%",padding:"12px 13px",borderRadius:10,border:`1.5px solid ${T.smoke}`,fontSize:16,color:T.navy,background:T.white,fontFamily:"inherit",direction:"rtl",...(p.style||{})}}>
      <option value="">— בחר —</option>
      {options.map(o=><option key={o} value={o}>{o}</option>)}
    </select>
  </div>
);
const Btn = ({children,onClick,color=T.orange,outline=false,small=false,full=false}) => (
  <button onClick={onClick} style={{background:outline?"transparent":color,color:outline?color:T.white,border:`2px solid ${color}`,borderRadius:10,padding:small?"8px 16px":"13px 22px",fontWeight:800,fontSize:small?13:15,cursor:"pointer",fontFamily:"inherit",display:"inline-flex",gap:6,alignItems:"center",justifyContent:"center",width:full?"100%":"auto"}}>
    {children}
  </button>
);
const Badge = ({children,color}) => (
  <span style={{background:color+"22",color,border:`1px solid ${color}44`,borderRadius:6,padding:"3px 10px",fontSize:11,fontWeight:700,whiteSpace:"nowrap"}}>{children}</span>
);
const Sheet = ({title,onClose,children}) => (
  <div style={{position:"fixed",inset:0,background:"#00000077",zIndex:300,display:"flex",flexDirection:"column",justifyContent:"flex-end"}} onClick={e=>e.target===e.currentTarget&&onClose()}>
    <div style={{background:T.white,borderRadius:"20px 20px 0 0",maxHeight:"88dvh",overflowY:"auto",padding:"0 18px",paddingBottom:"calc(24px + env(safe-area-inset-bottom,0px))"}}>
      <div style={{position:"sticky",top:0,background:T.white,paddingTop:14,paddingBottom:12,display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:`1px solid ${T.smoke}`,marginBottom:18,zIndex:1}}>
        <div style={{fontSize:17,fontWeight:900,color:T.navy}}>{title}</div>
        <button onClick={onClose} style={{background:T.smoke,border:"none",borderRadius:8,padding:"7px 12px",cursor:"pointer"}}><Icon name="x" size={16} color={T.slate}/></button>
      </div>
      {children}
    </div>
  </div>
);
const ExpPill = ({doc,onDelete}) => {
  const days=daysUntil(doc.expiry), color=expColor(days);
  return (
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 12px",background:color+"10",borderRadius:9,marginBottom:7,border:`1px solid ${color}30`}}>
      <div>
        <div style={{fontSize:13,fontWeight:700,color:T.navy}}>{doc.type}</div>
        {doc.expiry&&<div style={{fontSize:11,color:T.muted}}>{doc.expiry}</div>}
      </div>
      <div style={{display:"flex",gap:8,alignItems:"center"}}>
        <span style={{fontSize:11,fontWeight:700,color}}>{expText(days)}</span>
        {onDelete&&<button onClick={onDelete} style={{background:"none",border:"none",cursor:"pointer",padding:2}}><Icon name="x" size={14} color={T.red}/></button>}
      </div>
    </div>
  );
};
const Empty = ({icon,title,sub,action}) => (
  <div style={{textAlign:"center",padding:"60px 20px"}}>
    <div style={{background:T.smoke,borderRadius:"50%",width:76,height:76,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 18px"}}>
      <Icon name={icon} size={32} color={T.muted}/>
    </div>
    <div style={{fontSize:18,fontWeight:800,color:T.navy,marginBottom:7}}>{title}</div>
    <div style={{fontSize:13,color:T.muted,marginBottom:22}}>{sub}</div>
    {action}
  </div>
);

// ── Vehicle model suggestions ────────────────────────────────────
const TRUCK_MODELS = [
  // ולוו
  "Volvo FH16","Volvo FH","Volvo FM","Volvo FMX","Volvo FL","Volvo FE",
  // סקניה
  "Scania R500","Scania R450","Scania R410","Scania S500","Scania P360","Scania G450","Scania L","Scania XT",
  // מרצדס
  "Mercedes Actros","Mercedes Arocs","Mercedes Atego","Mercedes Antos","Mercedes Axor","Mercedes Econic",
  // MAN
  "MAN TGX","MAN TGS","MAN TGM","MAN TGL","MAN TGE",
  // DAF
  "DAF XF","DAF XG","DAF CF","DAF LF",
  // איווקו
  "Iveco S-Way","Iveco Stralis","Iveco Trakker","Iveco Eurocargo","Iveco Daily",
  // רנו
  "Renault T","Renault C","Renault K","Renault D","Renault Master",
  // פורד
  "Ford Transit","Ford F-Max","Ford Cargo",
  // פיאט
  "Fiat Ducato",
  // מצמ"ה
  "Caterpillar 320","Caterpillar 330","Caterpillar 349","Caterpillar 966","Caterpillar 980",
  "Komatsu PC200","Komatsu PC300","Komatsu WA380",
  "JCB 3CX","JCB 4CX","JCB JS220","JCB 531-70",
  "Liebherr LTM 1050","Liebherr LTM 1100","Liebherr LTM 1200",
  "Hyster H5.0","Hyster H7.0","Toyota 8FG25","Toyota 8FG30","Crown FC5200","Still RX20",
  "Bomag BW213","Bomag BW226","Dynapac CC224","Hamm HD90",
  // שונות
  "Freightliner Cascadia","Kenworth T680","Peterbilt 579","International LT",
];

const MANUFACTURERS = [
  "Volvo","Scania","Mercedes-Benz","MAN","DAF","Iveco","Renault","Ford","Fiat",
  "Caterpillar","Komatsu","JCB","Liebherr","Hyster","Toyota","Crown","Still",
  "Bomag","Dynapac","Hamm","Freightliner","Kenworth","Peterbilt","International",
  "Isuzu","Hino","Mitsubishi Fuso","Tata","Ashok Leyland",
];

// ── Autocomplete input ────────────────────────────────────────────
const AutoInp = ({label,value,onChange,onPick,suggestions,placeholder}) => {
  const [open,setOpen] = useState(false);
  const picking = useRef(false);
  const q = (value||"").toLowerCase();
  const filtered = q.length<1 ? [] : suggestions.filter(s=>s.toLowerCase().includes(q)).slice(0,7);
  const show = open && filtered.length > 0;

  const pick = (s) => {
    picking.current = false;
    onPick(s);
    setOpen(false);
  };

  return (
    <div style={{marginBottom:14}}>
      {label&&<div style={{fontSize:12,fontWeight:700,color:T.navy,marginBottom:5}}>{label}</div>}
      <input
        value={value}
        onChange={onChange}
        onFocus={()=>setOpen(true)}
        onBlur={()=>{ if(!picking.current) setOpen(false); }}
        placeholder={placeholder||""}
        style={{width:"100%",boxSizing:"border-box",padding:"12px 13px",borderRadius:show?"10px 10px 0 0":10,border:`1.5px solid ${show?T.orange:T.smoke}`,fontSize:16,color:T.navy,background:T.white,outline:"none",fontFamily:"inherit",direction:"rtl",transition:"border-color .15s"}}
      />
      {show&&(
        <div style={{background:T.white,border:`1.5px solid ${T.orange}`,borderTop:"none",borderRadius:"0 0 12px 12px",overflow:"hidden",boxShadow:"0 8px 20px #0F1F3D22",marginBottom:4}}>
          {filtered.map((s,i)=>{
            const idx = s.toLowerCase().indexOf(q);
            return (
              <div key={s}
                onTouchStart={()=>{ picking.current=true; }}
                onTouchEnd={()=>pick(s)}
                onClick={()=>pick(s)}
                style={{padding:"13px 16px",fontSize:15,color:T.navy,cursor:"pointer",borderTop:i>0?`1px solid ${T.smoke}`:"none",background:T.white,direction:"ltr",display:"flex",alignItems:"center",gap:10,WebkitUserSelect:"none"}}>
                <span style={{fontSize:10,color:T.orange,flexShrink:0}}>▸</span>
                <span style={{direction:"ltr"}}>
                  {idx===-1 ? s : <span>{s.slice(0,idx)}<strong style={{color:T.orange,fontWeight:800}}>{s.slice(idx,idx+q.length)}</strong>{s.slice(idx+q.length)}</span>}
                </span>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
};

// ── Forms ────────────────────────────────────────────────────────
const VehicleForm = ({initial={},onSave,onClose}) => {
  const [f,setF] = useState({num:"",model:"",manufacturer:"",year:"",chassisNum:"",engineNum:"",type:"",status:"תקין",notes:"",km:"",engineHours:"",...initial});
  const set = k => e => setF(p=>({...p,[k]:e.target.value}));
  const setVal = k => v => setF(p=>({...p,[k]:v}));
  const save = () => {
    if(!f.num||!f.model||!f.type){alert("מספר רכב, דגם וסוג הם שדות חובה");return;}
    onSave(f); onClose();
  };
  return (<>
    <Inp label="מספר רכב *" value={f.num} onChange={set("num")} placeholder="123-45-678"/>
    <AutoInp
      label="דגם *"
      value={f.model}
      onChange={e=>setF(p=>({...p,model:e.target.value}))}
      onPick={v=>{
        // auto-fill manufacturer from model name
        const mfr = MANUFACTURERS.find(m=>v.toLowerCase().startsWith(m.toLowerCase()));
        setF(p=>({...p,model:v,manufacturer:mfr||p.manufacturer}));
      }}
      suggestions={TRUCK_MODELS}
      placeholder="התחל להקליד דגם..."
    />
    <AutoInp
      label="יצרן"
      value={f.manufacturer}
      onChange={e=>setF(p=>({...p,manufacturer:e.target.value}))}
      onPick={setVal("manufacturer")}
      suggestions={MANUFACTURERS}
      placeholder="התחל להקליד יצרן..."
    />
    <Inp label="שנת ייצור" type="number" value={f.year} onChange={set("year")} placeholder="2020"/>
    <Inp label="מספר שלדה" value={f.chassisNum} onChange={set("chassisNum")}/>
    <Inp label="מספר מנוע" value={f.engineNum} onChange={set("engineNum")}/>
    <Sel label="סוג כלי רכב *" options={VEH_TYPES} value={f.type} onChange={set("type")}/>
    <Sel label="סטטוס" options={STATUS_V} value={f.status} onChange={set("status")}/>
    <Inp label='ק"מ נוכחי' type="number" value={f.km} onChange={set("km")} placeholder="0"/>
    <Inp label="שעות מנוע" type="number" value={f.engineHours} onChange={set("engineHours")} placeholder="0"/>
    <div style={{marginBottom:18}}>
      <div style={{fontSize:12,fontWeight:700,color:T.navy,marginBottom:5}}>הערות</div>
      <textarea value={f.notes} onChange={set("notes")} style={{width:"100%",padding:"12px 13px",borderRadius:10,border:`1.5px solid ${T.smoke}`,fontSize:16,color:T.navy,background:T.white,fontFamily:"inherit",direction:"rtl",minHeight:72,resize:"vertical"}}/>
    </div>
    <Btn full onClick={save}>שמור רכב</Btn>
  </>);
};
const DocForm = ({onSave,onClose}) => {
  const [f,setF] = useState({type:"",expiry:"",notes:""});
  const set = k => e => setF(p=>({...p,[k]:e.target.value}));
  const save = () => { if(!f.type){alert("יש לבחור סוג מסמך");return;} onSave(f); onClose(); };
  return (<>
    <Sel label="סוג מסמך *" options={DOC_TYPES} value={f.type} onChange={set("type")}/>
    <Inp label="תאריך תוקף" type="date" value={f.expiry} onChange={set("expiry")}/>
    <Inp label="הערות" value={f.notes} onChange={set("notes")}/>
    <Btn full onClick={save}>הוסף מסמך</Btn>
  </>);
};
const DriverForm = ({initial={},onSave,onClose,vehicles}) => {
  const [f,setF] = useState({name:"",idNum:"",phone:"",email:"",licenseNum:"",licenseType:"",licenseExpiry:"",yearsExp:"",vehicleId:"",status:"פעיל",notes:"",...initial});
  const set = k => e => setF(p=>({...p,[k]:e.target.value}));
  const save = () => { if(!f.name||!f.licenseNum){alert("שם ומספר רישיון הם שדות חובה");return;} onSave(f); onClose(); };
  return (<>
    <Inp label="שם מלא *" value={f.name} onChange={set("name")}/>
    <Inp label="תעודת זהות" value={f.idNum} onChange={set("idNum")}/>
    <Inp label="טלפון" type="tel" value={f.phone} onChange={set("phone")}/>
    <Inp label='דוא"ל' type="email" value={f.email} onChange={set("email")}/>
    <Inp label="מספר רישיון *" value={f.licenseNum} onChange={set("licenseNum")}/>
    <Sel label="סוג רישיון" options={LIC_TYPES} value={f.licenseType} onChange={set("licenseType")}/>
    <Inp label="תוקף רישיון" type="date" value={f.licenseExpiry} onChange={set("licenseExpiry")}/>
    <Inp label="ותק נהיגה (שנים)" type="number" value={f.yearsExp} onChange={set("yearsExp")}/>
    <div style={{marginBottom:14}}>
      <div style={{fontSize:12,fontWeight:700,color:T.navy,marginBottom:5}}>רכב משויך</div>
      <select value={f.vehicleId} onChange={set("vehicleId")} style={{width:"100%",padding:"12px 13px",borderRadius:10,border:`1.5px solid ${T.smoke}`,fontSize:16,color:T.navy,background:T.white,fontFamily:"inherit",direction:"rtl"}}>
        <option value="">— ללא שיוך —</option>
        {vehicles.map(v=><option key={v.id} value={v.id}>{v.model} ({v.num})</option>)}
      </select>
    </div>
    <Sel label="סטטוס" options={["פעיל","לא פעיל"]} value={f.status} onChange={set("status")}/>
    <Btn full onClick={save}>שמור נהג</Btn>
  </>);
};

// ── Main App ─────────────────────────────────────────────────────
function App() {
  const [state,dispatch] = useReducer(reducer,null,load);
  const [tab,setTab]     = useState("dashboard");
  const [modal,setModal] = useState(null);
  const [selVeh,setSelVeh] = useState(null);
  const [addDocFor,setAddDocFor] = useState(null);
  const [searchQ,setSearchQ]   = useState("");
  const [searchOpen,setSearchOpen] = useState(false);
  const searchRef = useRef(null);

  const {vehicles,drivers} = state;

  // ── Alerts computation ──────────────────────────────────────────
  const alerts = [];
  vehicles.forEach(v => {
    v.docs.forEach(doc => {
      const days=daysUntil(doc.expiry);
      if(days!==null&&days<=30){
        const level=days<0?"critical":days<7?"critical":days<14?"warning":"info";
        alerts.push({id:`${v.id}-${doc.id}`,vehicle:`${v.model} (${v.num})`,issue:`${doc.type} — ${expText(days)}`,level,days,vid:v.id});
      }
    });
  });
  drivers.forEach(d => {
    const days=daysUntil(d.licenseExpiry);
    if(days!==null&&days<=30){
      const level=days<0?"critical":days<14?"warning":"info";
      alerts.push({id:`drv-${d.id}`,vehicle:`נהג: ${d.name}`,issue:`רישיון נהיגה — ${expText(days)}`,level,days});
    }
  });
  alerts.sort((a,b)=>(a.days??999)-(b.days??999));
  const urgentCount = alerts.filter(a=>a.level==="critical").length;

  // ── Smart search ────────────────────────────────────────────────
  const q = searchQ.trim().toLowerCase();
  const searchResults = q.length < 1 ? [] : (() => {
    const res = [];
    vehicles.forEach(v => {
      const fs = [v.num,v.model,v.manufacturer,v.type,v.status,v.chassisNum,v.engineNum,v.notes,v.year].filter(Boolean).join(" ").toLowerCase();
      const ds = v.docs.map(d=>d.type+" "+(d.notes||"")).join(" ").toLowerCase();
      if(fs.includes(q)||ds.includes(q)){
        const md = v.docs.find(d=>(d.type+" "+(d.notes||"")).toLowerCase().includes(q));
        res.push({kind:"vehicle",v,matchDoc:md,score:(v.num.toLowerCase().startsWith(q)||v.model.toLowerCase().startsWith(q))?2:1});
      }
    });
    drivers.forEach(d => {
      const fs = [d.name,d.idNum,d.phone,d.email,d.licenseNum,d.licenseType].filter(Boolean).join(" ").toLowerCase();
      if(fs.includes(q)){
        const av = vehicles.find(v=>v.id===d.vehicleId);
        res.push({kind:"driver",d,assignedVehicle:av,score:d.name.toLowerCase().startsWith(q)?2:1});
      }
    });
    if(res.length===0){
      vehicles.forEach(v=>{
        v.docs.forEach(doc=>{
          if((doc.type.toLowerCase().includes(q)||(doc.notes||"").toLowerCase().includes(q))&&!res.find(r=>r.kind==="vehicle"&&r.v.id===v.id)){
            res.push({kind:"vehicle",v,matchDoc:doc,score:1});
          }
        });
      });
    }
    return res.sort((a,b)=>b.score-a.score).slice(0,10);
  })();

  // highlight matched text
  const Hl = ({text}) => {
    if(!q||!text) return <span>{text||""}</span>;
    const i = (text+"").toLowerCase().indexOf(q);
    if(i===-1) return <span>{text}</span>;
    const t = text+"";
    return <span>{t.slice(0,i)}<mark style={{background:T.orange+"55",color:T.navy,borderRadius:2,padding:"0 1px"}}>{t.slice(i,i+q.length)}</mark>{t.slice(i+q.length)}</span>;
  };

  // ── Layout constants ─────────────────────────────────────────────
  const HEADER_H = "calc(108px + env(safe-area-inset-top,0px))";
  const NAV_H    = "calc(60px + env(safe-area-inset-bottom,0px))";

  // ── Header ───────────────────────────────────────────────────────
  const Header = () => (
    <div style={{background:T.navy,position:"fixed",top:0,left:0,right:0,zIndex:200}}>
      {/* Top row */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"calc(10px + env(safe-area-inset-top,0px)) 18px 8px"}}>
        <div style={{fontSize:22,fontWeight:900,color:T.white,letterSpacing:-0.5}}>
          צי<span style={{color:T.orange}}>360</span>
        </div>
        <div style={{position:"relative"}}>
          <Icon name="bell" size={24} color={T.white}/>
          {urgentCount>0&&(
            <div style={{position:"absolute",top:-5,left:-5,background:T.red,borderRadius:"50%",width:18,height:18,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:900,color:T.white}}>{urgentCount}</div>
          )}
        </div>
      </div>
      {/* Search bar */}
      <div style={{padding:"0 14px 10px"}}>
        <div style={{display:"flex",alignItems:"center",gap:10,background:"rgba(255,255,255,0.13)",borderRadius:12,padding:"10px 14px",border:searchOpen?`1.5px solid ${T.orange}`:"1.5px solid transparent",transition:"border-color .2s"}}>
          <Icon name="search" size={16} color={searchOpen?T.orange:"rgba(255,255,255,0.55)"}/>
          <input
            ref={searchRef}
            value={searchQ}
            onChange={e=>setSearchQ(e.target.value)}
            onFocus={()=>setSearchOpen(true)}
            onBlur={()=>setTimeout(()=>setSearchOpen(false),200)}
            placeholder="חפש רכב, נהג, מספר רכב, מסמך..."
            style={{background:"none",border:"none",outline:"none",color:T.white,fontSize:15,width:"100%",direction:"rtl",fontFamily:"inherit"}}
          />
          {searchQ&&(
            <button onClick={()=>{setSearchQ("");searchRef.current&&searchRef.current.focus();}} style={{background:"none",border:"none",cursor:"pointer",padding:0,flexShrink:0}}>
              <Icon name="x" size={14} color="rgba(255,255,255,0.7)"/>
            </button>
          )}
        </div>
      </div>
    </div>
  );

  // ── Search results overlay ───────────────────────────────────────
  const SearchOverlay = () => {
    if(!searchOpen && !searchQ) return null;
    return (
      <div style={{position:"fixed",top:HEADER_H,left:0,right:0,bottom:0,zIndex:150,padding:"8px 14px",overflowY:"auto",background:"rgba(15,31,61,0.15)"}}>
        {q.length>0&&searchResults.length===0&&(
          <div style={{background:T.white,borderRadius:14,padding:"24px",textAlign:"center",boxShadow:"0 4px 20px #0F1F3D22"}}>
            <div style={{fontSize:14,color:T.muted}}>אין תוצאות עבור "{searchQ}"</div>
            <div style={{fontSize:11,color:T.muted,marginTop:5}}>נסה מספר רכב, שם נהג, או סוג מסמך</div>
          </div>
        )}
        {q.length>0&&searchResults.length>0&&(
          <div style={{background:T.white,borderRadius:14,overflow:"hidden",boxShadow:"0 6px 28px #0F1F3D33"}}>
            {searchResults.map((r,i)=>{
              const last = i===searchResults.length-1;
              const border = last?"none":`1px solid ${T.smoke}`;
              if(r.kind==="vehicle"){
                const sc={תקין:T.green,אזהרה:T.yellow,מושבת:T.red}[r.v.status]||T.muted;
                return (
                  <div key={r.v.id+i} onClick={()=>{setSearchQ("");setSearchOpen(false);setSelVeh(r.v);}}
                    style={{display:"flex",gap:12,alignItems:"center",padding:"13px 16px",borderBottom:border,cursor:"pointer",background:T.white}}>
                    <div style={{width:38,height:38,borderRadius:10,background:T.orange+"18",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                      <Icon name="truck" size={18} color={T.orange}/>
                    </div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:14,fontWeight:800,color:T.navy}}><Hl text={r.v.model}/></div>
                      <div style={{fontSize:11,color:T.muted}}><Hl text={r.v.num}/> · {r.v.type}</div>
                      {r.matchDoc&&<div style={{fontSize:11,color:T.orange,marginTop:2}}>📄 <Hl text={r.matchDoc.type}/></div>}
                    </div>
                    <span style={{fontSize:10,fontWeight:700,color:sc,flexShrink:0}}>{r.v.status}</span>
                  </div>
                );
              } else {
                const av=r.assignedVehicle;
                return (
                  <div key={r.d.id+i} onClick={()=>{setSearchQ("");setSearchOpen(false);setTab("drivers");}}
                    style={{display:"flex",gap:12,alignItems:"center",padding:"13px 16px",borderBottom:border,cursor:"pointer",background:T.white}}>
                    <div style={{width:38,height:38,borderRadius:10,background:T.sky+"18",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                      <Icon name="driver" size={18} color={T.sky}/>
                    </div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:14,fontWeight:800,color:T.navy}}><Hl text={r.d.name}/></div>
                      <div style={{fontSize:11,color:T.muted}}>
                        {r.d.licenseType&&`רישיון ${r.d.licenseType}`}{av&&` · ${av.model}`}
                      </div>
                      {r.d.phone&&<div style={{fontSize:11,color:T.muted}}><Hl text={r.d.phone}/></div>}
                    </div>
                    <span style={{fontSize:10,fontWeight:700,color:T.green,flexShrink:0}}>{r.d.status}</span>
                  </div>
                );
              }
            })}
          </div>
        )}
      </div>
    );
  };

  // ── Bottom nav ───────────────────────────────────────────────────
  const BottomNav = () => (
    <div style={{background:T.white,borderTop:`1px solid ${T.smoke}`,display:"flex",position:"fixed",bottom:0,left:0,right:0,zIndex:200,paddingBottom:"env(safe-area-inset-bottom,0px)"}}>
      {[
        {id:"dashboard",icon:"home",  label:"בקרה"},
        {id:"vehicles", icon:"truck", label:"רכבים"},
        {id:"alerts",   icon:"alert", label:"התראות"},
        {id:"drivers",  icon:"driver",label:"נהגים"},
      ].map(item=>(
        <button key={item.id} onClick={()=>{setTab(item.id);setSearchQ("");setSearchOpen(false);}}
          style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3,padding:"10px 4px 8px",cursor:"pointer",color:tab===item.id?T.orange:T.muted,background:"none",border:"none",fontFamily:"inherit"}}>
          <div style={{position:"relative"}}>
            <Icon name={item.icon} size={22} color={tab===item.id?T.orange:T.muted}/>
            {item.id==="alerts"&&urgentCount>0&&(
              <div style={{position:"absolute",top:-4,left:-4,background:T.red,borderRadius:"50%",width:13,height:13,display:"flex",alignItems:"center",justifyContent:"center",fontSize:8,fontWeight:900,color:T.white}}>{urgentCount}</div>
            )}
          </div>
          <span style={{fontSize:10,fontWeight:tab===item.id?800:500}}>{item.label}</span>
          {tab===item.id&&<div style={{width:4,height:4,borderRadius:"50%",background:T.orange}}/>}
        </button>
      ))}
    </div>
  );

  const bodyStyle = {position:"fixed",top:HEADER_H,bottom:NAV_H,left:0,right:0,overflowY:"auto",padding:"16px 14px",background:T.smoke};

  // ── Vehicle Detail ───────────────────────────────────────────────
  const VehicleDetail = ({v}) => (
    <div style={{position:"fixed",inset:0,background:T.smoke,zIndex:180,overflowY:"auto",paddingBottom:40}}>
      <div style={{background:T.navy,display:"flex",alignItems:"center",justifyContent:"space-between",padding:"calc(12px + env(safe-area-inset-top,0px)) 18px 14px",position:"sticky",top:0,zIndex:10}}>
        <button onClick={()=>setSelVeh(null)} style={{background:"none",border:"none",cursor:"pointer",color:T.white,display:"flex",gap:6,alignItems:"center",fontSize:14,fontWeight:700}}>
          <Icon name="back" size={18} color={T.white}/> חזרה
        </button>
        <div style={{color:T.white,fontWeight:800,fontSize:15}}>{v.model}</div>
        <button onClick={()=>{if(window.confirm("למחוק רכב זה?")){dispatch({type:"DEL_VEH",id:v.id});setSelVeh(null);}}} style={{background:"none",border:"none",cursor:"pointer"}}>
          <Icon name="trash" size={18} color={T.red+"cc"}/>
        </button>
      </div>
      <div style={{padding:"16px 14px"}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:16}}>
          {[["מספר רכב",v.num],["סוג",v.type],["יצרן",v.manufacturer||"—"],["שנה",v.year||"—"],['ק"מ',v.km?Number(v.km).toLocaleString():"—"],["שעות מנוע",v.engineHours||"—"],["מס׳ שלדה",v.chassisNum||"—"],["מס׳ מנוע",v.engineNum||"—"]].map(([k,val])=>(
            <div key={k} style={{background:T.white,borderRadius:10,padding:"11px 13px"}}>
              <div style={{fontSize:10,color:T.muted,marginBottom:2}}>{k}</div>
              <div style={{fontSize:14,fontWeight:700,color:T.navy}}>{val}</div>
            </div>
          ))}
        </div>
        <div style={{display:"flex",gap:8,marginBottom:12,alignItems:"center"}}>
          <div style={{fontSize:13,color:T.muted}}>סטטוס:</div>
          <Badge color={{תקין:T.green,אזהרה:T.yellow,מושבת:T.red}[v.status]||T.muted}>{v.status}</Badge>
        </div>
        {v.notes&&<div style={{background:T.white,borderRadius:10,padding:"12px 14px",fontSize:13,color:T.muted,marginBottom:16}}>{v.notes}</div>}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <div style={{fontSize:15,fontWeight:800,color:T.navy}}>מסמכים ותוקפים</div>
          <Btn small onClick={()=>setAddDocFor(v.id)}><Icon name="plus" size={13} color={T.white}/> הוסף</Btn>
        </div>
        {v.docs.length===0?(
          <div style={{background:T.white,borderRadius:12,padding:"24px",textAlign:"center",marginBottom:16}}>
            <div style={{fontSize:13,color:T.muted}}>אין מסמכים עדיין</div>
            <div style={{fontSize:11,color:T.muted,marginTop:4}}>הוסף טסט, ביטוח, רישיון ועוד</div>
          </div>
        ):(
          <div style={{marginBottom:16}}>
            {v.docs.map(doc=><ExpPill key={doc.id} doc={doc} onDelete={()=>dispatch({type:"DEL_DOC",vid:v.id,did:doc.id})}/>)}
          </div>
        )}
        <Btn outline color={T.navy} onClick={()=>setModal({type:"edit-veh",payload:v})}>ערוך פרטי רכב</Btn>
      </div>
      {addDocFor&&(
        <Sheet title="הוסף מסמך / תוקף" onClose={()=>setAddDocFor(null)}>
          <DocForm onSave={doc=>dispatch({type:"ADD_DOC",vid:addDocFor,doc})} onClose={()=>setAddDocFor(null)}/>
        </Sheet>
      )}
      {modal?.type==="edit-veh"&&(
        <Sheet title="ערוך רכב" onClose={()=>setModal(null)}>
          <VehicleForm initial={modal.payload} onSave={v=>dispatch({type:"UPD_VEH",v})} onClose={()=>setModal(null)}/>
        </Sheet>
      )}
    </div>
  );

  // ── Dashboard ────────────────────────────────────────────────────
  const Dashboard = () => {
    const aV=vehicles.filter(v=>v.status==="תקין").length;
    const wV=vehicles.filter(v=>v.status==="אזהרה").length;
    const dV=vehicles.filter(v=>v.status==="מושבת").length;
    if(vehicles.length===0&&drivers.length===0) return (
      <Empty icon="home" title="ברוכים הבאים לצי360" sub="התחל בהוספת כלי הרכב והנהגים שלך"
        action={<div style={{display:"flex",gap:10,justifyContent:"center",flexWrap:"wrap"}}>
          <Btn onClick={()=>{setTab("vehicles");setModal({type:"add-veh"});}}><Icon name="truck" size={16} color={T.white}/> הוסף רכב</Btn>
          <Btn color={T.sky} onClick={()=>{setTab("drivers");setModal({type:"add-drv"});}}><Icon name="driver" size={16} color={T.white}/> הוסף נהג</Btn>
        </div>}/>
    );
    return (<div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
        {[
          {icon:"truck", label:"כלי רכב",      value:vehicles.length,accent:T.orange},
          {icon:"driver",label:"נהגים",         value:drivers.length, accent:T.sky},
          {icon:"alert", label:"התראות",        value:alerts.length,  accent:alerts.length>0?T.red:T.green},
          {icon:"doc",   label:"תוקפים קרובים",value:alerts.filter(a=>a.days<14).length,accent:T.yellow},
        ].map(({icon,label,value,accent})=>(
          <div key={label} style={{background:T.white,borderRadius:14,padding:"18px 16px",display:"flex",gap:12,alignItems:"center",boxShadow:"0 2px 8px #0F1F3D12"}}>
            <div style={{width:44,height:44,borderRadius:11,background:accent+"18",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
              <Icon name={icon} size={20} color={accent}/>
            </div>
            <div>
              <div style={{fontSize:28,fontWeight:900,color:T.navy,lineHeight:1}}>{value}</div>
              <div style={{fontSize:11,color:T.muted,marginTop:3}}>{label}</div>
            </div>
          </div>
        ))}
      </div>
      {vehicles.length>0&&(
        <div style={{background:T.white,borderRadius:14,padding:"16px 18px",marginBottom:14,boxShadow:"0 2px 8px #0F1F3D10"}}>
          <div style={{fontSize:13,fontWeight:700,color:T.navy,marginBottom:10}}>מצב הצי</div>
          <div style={{display:"flex",borderRadius:8,overflow:"hidden",height:20,marginBottom:8}}>
            {[[aV,T.green],[wV,T.yellow],[dV,T.red]].map(([n,c],i)=>n>0&&<div key={i} style={{width:`${(n/vehicles.length)*100}%`,background:c}}/>)}
          </div>
          <div style={{display:"flex",gap:14,fontSize:11}}>
            {[["תקינים",aV,T.green],["אזהרה",wV,T.yellow],["מושבתים",dV,T.red]].map(([l,n,c])=>(
              <div key={l} style={{display:"flex",gap:5,alignItems:"center"}}>
                <div style={{width:8,height:8,borderRadius:2,background:c}}/>
                <span style={{color:T.muted}}>{l}</span><strong style={{color:T.navy}}>{n}</strong>
              </div>
            ))}
          </div>
        </div>
      )}
      {alerts.length>0&&(<>
        <div style={{fontSize:17,fontWeight:800,color:T.navy,marginBottom:10}}>התראות קרובות</div>
        <div style={{background:T.white,borderRadius:14,overflow:"hidden",boxShadow:"0 2px 8px #0F1F3D10",marginBottom:14}}>
          {alerts.slice(0,5).map((a,i)=>{
            const color={critical:T.red,warning:T.yellow,info:T.sky}[a.level];
            return (<div key={a.id} style={{display:"flex",gap:10,alignItems:"center",padding:"13px 16px",borderBottom:i<Math.min(alerts.length,5)-1?`1px solid ${T.smoke}`:"none"}}>
              <div style={{width:4,height:40,background:color,borderRadius:2,flexShrink:0}}/>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:13,fontWeight:700,color:T.navy}}>{a.vehicle}</div>
                <div style={{fontSize:12,color:T.muted,marginTop:2}}>{a.issue}</div>
              </div>
            </div>);
          })}
        </div>
      </>)}
      <div style={{display:"flex",gap:10}}>
        <button onClick={()=>{setTab("vehicles");setModal({type:"add-veh"});}} style={{flex:1,background:T.navy,border:"none",borderRadius:12,padding:14,color:T.white,fontWeight:700,fontSize:13,cursor:"pointer",display:"flex",gap:7,alignItems:"center",justifyContent:"center"}}>
          <Icon name="plus" size={16} color={T.white}/> הוסף רכב
        </button>
        <button onClick={()=>{setTab("drivers");setModal({type:"add-drv"});}} style={{flex:1,background:T.navyMid,border:"none",borderRadius:12,padding:14,color:T.white,fontWeight:700,fontSize:13,cursor:"pointer",display:"flex",gap:7,alignItems:"center",justifyContent:"center"}}>
          <Icon name="plus" size={16} color={T.white}/> הוסף נהג
        </button>
      </div>
    </div>);
  };

  // ── Vehicles list — grouped by type, expandable ─────────────────
  const Vehicles = () => {
    const [openTypes, setOpenTypes] = useState({});
    const [expandedVeh, setExpandedVeh] = useState({});

    const toggleType = (type) => setOpenTypes(p=>({...p,[type]:!p[type]}));
    const toggleVeh  = (id,e)  => { e.stopPropagation(); setExpandedVeh(p=>({...p,[id]:!p[id]})); };

    // Group vehicles by type
    const groups = VEH_TYPES.map(type=>{
      const list = vehicles.filter(v=>v.type===type).map(v=>({...v,_status:autoStatus(v.docs)}));
      return {type, list};
    }).filter(g=>g.list.length>0);

    const ungrouped = vehicles.filter(v=>!VEH_TYPES.includes(v.type)).map(v=>({...v,_status:autoStatus(v.docs)}));
    if(ungrouped.length>0) groups.push({type:"אחר",list:ungrouped});

    return (<div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <div style={{fontSize:18,fontWeight:800,color:T.navy}}>כלי רכב</div>
        <Btn small onClick={()=>setModal({type:"add-veh"})}><Icon name="plus" size={13} color={T.white}/> הוסף</Btn>
      </div>

      {vehicles.length===0?(
        <Empty icon="truck" title="אין כלי רכב" sub="הוסף את הרכב הראשון לצי שלך"
          action={<Btn onClick={()=>setModal({type:"add-veh"})}><Icon name="plus" size={16} color={T.white}/> הוסף רכב</Btn>}/>
      ):(
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {groups.map(({type,list})=>{
            const ok  = list.filter(v=>v._status==="תקין").length;
            const warn= list.filter(v=>v._status==="אזהרה").length;
            const bad = list.filter(v=>v._status==="מושבת").length;
            const isOpen = !!openTypes[type];

            return (
              <div key={type} style={{background:T.white,borderRadius:14,overflow:"hidden",boxShadow:"0 2px 8px #0F1F3D0e"}}>
                {/* Group header row */}
                <div onClick={()=>toggleType(type)}
                  style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 18px",cursor:"pointer",borderBottom:isOpen?`1px solid ${T.smoke}`:"none"}}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <div style={{width:36,height:36,borderRadius:10,background:T.orange+"15",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                      <Icon name="truck" size={17} color={T.orange}/>
                    </div>
                    <div>
                      <div style={{fontSize:15,fontWeight:800,color:T.navy}}>{type}</div>
                      <div style={{fontSize:11,color:T.muted}}>{list.length} כלי רכב</div>
                    </div>
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    {/* status dots summary */}
                    <div style={{display:"flex",gap:6,alignItems:"center"}}>
                      {ok>0&&<span style={{fontSize:11,fontWeight:700,color:T.green,display:"flex",alignItems:"center",gap:3}}>
                        <span style={{width:7,height:7,borderRadius:"50%",background:T.green,display:"inline-block"}}/>
                        {ok}
                      </span>}
                      {warn>0&&<span style={{fontSize:11,fontWeight:700,color:T.yellow,display:"flex",alignItems:"center",gap:3}}>
                        <span style={{width:7,height:7,borderRadius:"50%",background:T.yellow,display:"inline-block"}}/>
                        {warn}
                      </span>}
                      {bad>0&&<span style={{fontSize:11,fontWeight:700,color:T.red,display:"flex",alignItems:"center",gap:3}}>
                        <span style={{width:7,height:7,borderRadius:"50%",background:T.red,display:"inline-block"}}/>
                        {bad}
                      </span>}
                    </div>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={T.muted} strokeWidth="2.5" strokeLinecap="round">
                      {isOpen
                        ? <polyline points="18 15 12 9 6 15"/>
                        : <polyline points="6 9 12 15 18 9"/>}
                    </svg>
                  </div>
                </div>

                {/* Vehicle rows */}
                {isOpen && list.map((v,vi)=>{
                  const isExp = !!expandedVeh[v.id];
                  const sc = {תקין:T.green,אזהרה:T.yellow,מושבת:T.red}[v._status]||T.muted;
                  const urgentDocs = v.docs.filter(d=>{const days=daysUntil(d.expiry);return days!==null&&days<0;});
                  return (
                    <div key={v.id} style={{borderBottom:vi<list.length-1?`1px solid ${T.smoke}`:"none"}}>
                      {/* Vehicle summary row */}
                      <div style={{display:"flex",alignItems:"center",padding:"12px 16px",gap:10}}>
                        {/* status stripe */}
                        <div style={{width:4,alignSelf:"stretch",borderRadius:2,background:sc,flexShrink:0}}/>
                        {/* info */}
                        <div style={{flex:1,minWidth:0,cursor:"pointer"}} onClick={()=>setSelVeh(v)}>
                          <div style={{fontSize:14,fontWeight:800,color:T.navy}}>{v.model}</div>
                          <div style={{fontSize:11,color:T.muted}}>{v.num}{v.km?` · ${Number(v.km).toLocaleString()} ק"מ`:""}</div>
                        </div>
                        {/* status badge */}
                        <Badge color={sc}>{v._status}</Badge>
                        {/* expand toggle */}
                        <button onClick={e=>toggleVeh(v.id,e)}
                          style={{background:T.smoke,border:"none",borderRadius:8,padding:"6px 10px",cursor:"pointer",flexShrink:0,display:"flex",alignItems:"center"}}>
                          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={T.slate} strokeWidth="2.5" strokeLinecap="round">
                            {isExp
                              ? <polyline points="18 15 12 9 6 15"/>
                              : <polyline points="6 9 12 15 18 9"/>}
                          </svg>
                        </button>
                      </div>

                      {/* Expanded content */}
                      {isExp&&(
                        <div style={{padding:"0 16px 14px 16px",background:T.smoke+"88"}}>
                          {v.docs.length===0?(
                            <div style={{fontSize:12,color:T.muted,padding:"8px 0"}}>אין מסמכים — לחץ על הרכב להוספה</div>
                          ):(
                            v.docs.map(doc=><ExpPill key={doc.id} doc={doc}/>)
                          )}
                          <div style={{display:"flex",gap:8,marginTop:8}}>
                            <button onClick={()=>setSelVeh(v)}
                              style={{flex:1,background:T.navy,border:"none",borderRadius:9,padding:"9px",color:T.white,fontSize:12,fontWeight:700,cursor:"pointer"}}>
                              פתח כרטיס
                            </button>
                            <button onClick={()=>{setAddDocFor(v.id);}}
                              style={{flex:1,background:T.orange,border:"none",borderRadius:9,padding:"9px",color:T.white,fontSize:12,fontWeight:700,cursor:"pointer"}}>
                              + מסמך
                            </button>
                          </div>
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            );
          })}
        </div>
      )}

      {/* Add doc sheet triggered from expanded row */}
      {addDocFor&&(
        <Sheet title="הוסף מסמך / תוקף" onClose={()=>setAddDocFor(null)}>
          <DocForm onSave={doc=>dispatch({type:"ADD_DOC",vid:addDocFor,doc})} onClose={()=>setAddDocFor(null)}/>
        </Sheet>
      )}
    </div>);
  };

  // ── Alerts list ──────────────────────────────────────────────────
  const Alerts = () => (<div>
    <div style={{fontSize:18,fontWeight:800,color:T.navy,marginBottom:12}}>התראות</div>
    {alerts.length===0?(
      <Empty icon="check" title="הכל תקין!" sub="אין תוקפים הקרובים לפקיעה ב-30 הימים הקרובים"/>
    ):(
      <div style={{background:T.white,borderRadius:14,overflow:"hidden",boxShadow:"0 2px 8px #0F1F3D10",marginBottom:14}}>
        {alerts.map((a,i)=>{
          const color={critical:T.red,warning:T.yellow,info:T.sky}[a.level];
          return (<div key={a.id} style={{display:"flex",gap:12,alignItems:"center",padding:"14px 16px",borderBottom:i<alerts.length-1?`1px solid ${T.smoke}`:"none",cursor:a.vid?"pointer":"default"}}
            onClick={()=>{if(a.vid){const v=vehicles.find(v=>v.id===a.vid);if(v)setSelVeh(v);}}}>
            <div style={{width:4,height:42,background:color,borderRadius:2,flexShrink:0}}/>
            <div style={{flex:1}}>
              <div style={{fontSize:13,fontWeight:700,color:T.navy}}>{a.vehicle}</div>
              <div style={{fontSize:12,color:T.muted,marginTop:2}}>{a.issue}</div>
            </div>
            <Badge color={color}>{a.level==="critical"?"דחוף":a.level==="warning"?"אזהרה":"מידע"}</Badge>
          </div>);
        })}
      </div>
    )}
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
      {[["דחוף",alerts.filter(a=>a.level==="critical").length,T.red],["אזהרה",alerts.filter(a=>a.level==="warning").length,T.yellow],["מידע",alerts.filter(a=>a.level==="info").length,T.sky]].map(([l,n,c])=>(
        <div key={l} style={{background:T.white,borderRadius:12,padding:"14px 10px",textAlign:"center",border:`1.5px solid ${c}44`}}>
          <div style={{fontSize:26,fontWeight:900,color:c}}>{n}</div>
          <div style={{fontSize:11,color:T.muted,marginTop:3}}>{l}</div>
        </div>
      ))}
    </div>
  </div>);

  // ── Drivers list ─────────────────────────────────────────────────
  const Drivers = () => (<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
      <div style={{fontSize:18,fontWeight:800,color:T.navy}}>נהגים</div>
      <Btn small onClick={()=>setModal({type:"add-drv"})}><Icon name="plus" size={13} color={T.white}/> הוסף</Btn>
    </div>
    {drivers.length===0?(
      <Empty icon="driver" title="אין נהגים" sub="הוסף את הנהגים שמשויכים לצי שלך"
        action={<Btn onClick={()=>setModal({type:"add-drv"})}><Icon name="plus" size={16} color={T.white}/> הוסף נהג</Btn>}/>
    ):(
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {drivers.map(d=>{
          const ld=daysUntil(d.licenseExpiry), lc=expColor(ld);
          const av=vehicles.find(v=>v.id===d.vehicleId);
          return (<div key={d.id} style={{background:T.white,borderRadius:14,padding:"16px 18px",boxShadow:"0 2px 8px #0F1F3D0e"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
              <div style={{flex:1}}>
                <div style={{fontSize:16,fontWeight:800,color:T.navy}}>{d.name}</div>
                <div style={{fontSize:12,color:T.muted,marginTop:2}}>
                  {d.licenseType&&`רישיון ${d.licenseType}`}{av&&` · ${av.model}`}
                </div>
                {d.licenseExpiry&&<div style={{fontSize:12,marginTop:6,color:lc,fontWeight:600}}>תוקף רישיון: {expText(ld)}</div>}
                {d.phone&&<div style={{fontSize:12,color:T.muted,marginTop:3}}>{d.phone}</div>}
              </div>
              <div style={{display:"flex",gap:6}}>
                <button onClick={()=>setModal({type:"edit-drv",payload:d})} style={{background:T.smoke,border:"none",borderRadius:8,padding:"8px 12px",cursor:"pointer"}}>
                  <Icon name="wrench" size={15} color={T.slate}/>
                </button>
                <button onClick={()=>{if(window.confirm("למחוק נהג זה?"))dispatch({type:"DEL_DRV",id:d.id});}} style={{background:T.smoke,border:"none",borderRadius:8,padding:"8px 12px",cursor:"pointer"}}>
                  <Icon name="trash" size={15} color={T.red}/>
                </button>
              </div>
            </div>
          </div>);
        })}
      </div>
    )}
  </div>);

  // ── Render ───────────────────────────────────────────────────────
  if(selVeh){
    const fresh=vehicles.find(v=>v.id===selVeh.id);
    if(!fresh){setSelVeh(null);return null;}
    return <VehicleDetail v={fresh}/>;
  }

  return (
    <div style={{height:"100dvh",background:T.smoke,overflow:"hidden",position:"relative"}}>
      <Header/>
      <SearchOverlay/>
      <div style={bodyStyle}>
        {tab==="dashboard"&&<Dashboard/>}
        {tab==="vehicles" &&<Vehicles/>}
        {tab==="alerts"   &&<Alerts/>}
        {tab==="drivers"  &&<Drivers/>}
      </div>
      <BottomNav/>

      {modal?.type==="add-veh"&&<Sheet title="הוסף כלי רכב" onClose={()=>setModal(null)}><VehicleForm onSave={v=>dispatch({type:"ADD_VEH",v})} onClose={()=>setModal(null)}/></Sheet>}
      {modal?.type==="edit-veh"&&<Sheet title="ערוך רכב" onClose={()=>setModal(null)}><VehicleForm initial={modal.payload} onSave={v=>dispatch({type:"UPD_VEH",v})} onClose={()=>setModal(null)}/></Sheet>}
      {modal?.type==="add-drv"&&<Sheet title="הוסף נהג" onClose={()=>setModal(null)}><DriverForm vehicles={vehicles} onSave={d=>dispatch({type:"ADD_DRV",d})} onClose={()=>setModal(null)}/></Sheet>}
      {modal?.type==="edit-drv"&&<Sheet title="ערוך נהג" onClose={()=>setModal(null)}><DriverForm initial={modal.payload} vehicles={vehicles} onSave={d=>dispatch({type:"UPD_DRV",d})} onClose={()=>setModal(null)}/></Sheet>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

<script>
if('serviceWorker' in navigator){
  const sw=`const CACHE='fleet360-v2';
self.addEventListener('install',e=>{e.waitUntil(caches.open(CACHE).then(c=>c.add('/')));self.skipWaiting();});
self.addEventListener('activate',e=>{e.waitUntil(clients.claim());});
self.addEventListener('fetch',e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request)));});`;
  const blob=new Blob([sw],{type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
}
</script>
</body>
</html>
